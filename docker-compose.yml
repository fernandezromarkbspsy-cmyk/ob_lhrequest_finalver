services:
  api:
    build:
      context: .
      target: backend
    env_file: .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      target: frontend
    environment:
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 5173
      FRONTEND_API_URL: http://api:8080
    ports:
      - "5173:5173"
    depends_on:
      - api

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "8088:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
